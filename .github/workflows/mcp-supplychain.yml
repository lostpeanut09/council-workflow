name: MCP Supply Chain Guardrail

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  mcp-supplychain:
    name: MCP supply chain checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Block deprecated @modelcontextprotocol/server-github
        run: |
          # Search only source files, excluding the workflow that contains these strings
          # as part of its own grep commands and documentation
          BAD=$(git grep -n "@modelcontextprotocol/server-github" \
                -- 'kilo.jsonc' '.kilocode/mcp.json' 'scripts/*.mjs' 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "❌ Found deprecated @modelcontextprotocol/server-github"
            echo "$BAD"
            echo "   → Use ghcr.io/github/github-mcp-server (Docker official) instead"
            exit 1
          fi
          echo "✅ No deprecated server-github in source files"

      - name: Block deprecated @modelcontextprotocol/server-puppeteer
        run: |
          BAD=$(git grep -n "@modelcontextprotocol/server-puppeteer" \
                -- 'kilo.jsonc' '.kilocode/mcp.json' 'scripts/*.mjs' 2>/dev/null || true)
          if [ -n "$BAD" ]; then
            echo "❌ Found deprecated @modelcontextprotocol/server-puppeteer"
            echo "$BAD"
            echo "   → Use mcp/playwright (Docker/Microsoft official) instead"
            exit 1
          fi
          echo "✅ No deprecated server-puppeteer in source files"

      - name: Require pinned versions in kilo.jsonc and .kilocode/mcp.json
        run: |
          # Check only the config files where versions must be literal strings (not JS templates)
          # Template literals in install-kilo-jsonc.mjs are validated indirectly via kilo.jsonc output
          for FILE in kilo.jsonc .kilocode/mcp.json; do
            if [ ! -f "$FILE" ]; then continue; fi

            if git grep -nP '@modelcontextprotocol/server-filesystem(?!@\d)' -- "$FILE" 2>/dev/null; then
              echo "❌ $FILE: server-filesystem must be pinned to @YYYY.M.D"
              exit 1
            fi
            if git grep -nP '@modelcontextprotocol/server-everything(?!@\d)' -- "$FILE" 2>/dev/null; then
              echo "❌ $FILE: server-everything must be pinned to @YYYY.M.D"
              exit 1
            fi
          done
          echo "✅ All config file MCP references are pinned"

      - name: MCP_PINS constant must exist in installer
        run: |
          # Verify install-kilo-jsonc.mjs defines pinned versions via MCP_PINS constant
          if ! git grep -q 'const MCP_PINS' -- scripts/install-kilo-jsonc.mjs 2>/dev/null; then
            echo "❌ scripts/install-kilo-jsonc.mjs missing MCP_PINS constant"
            echo "   → Add: const MCP_PINS = { filesystem: \"x.y.z\", everything: \"x.y.z\" }"
            exit 1
          fi
          echo "✅ MCP_PINS constant present in installer"

      - name: No literal unversioned npx MCP calls in config files
        run: |
          # In JSON/JSONC config files, package names must appear with @version literal
          BAD=$(git grep -nP '"@modelcontextprotocol/server-(?!sdk)[a-z-]+"' \
                -- 'kilo.jsonc' '.kilocode/mcp.json' 2>/dev/null \
                | grep -vP '@\d' || true)
          if [ -n "$BAD" ]; then
            echo "❌ Unversioned MCP package in config file:"
            echo "$BAD"
            exit 1
          fi
          echo "✅ All MCP packages in config files are versioned"

      - name: Enforce digest pinning when lock file is populated
        run: |
          # If MCP_IMAGE_PINS.lock.json exists and contains @sha256 digests,
          # the installer must also reference those digests (not just tags).
          LOCK="docs/MCP_IMAGE_PINS.lock.json"
          if [ ! -f "$LOCK" ]; then
            echo "ℹ️  No image lock file found — digest pinning not yet configured (optional)"
            exit 0
          fi
          if ! grep -q '@sha256:' "$LOCK"; then
            echo "ℹ️  Lock file present but digests are null — run scripts/update-mcp-image-pins.mjs"
            exit 0
          fi
          # Lock has real digests — installer must use pinnedImage() helper
          if ! git grep -q 'pinnedImage' -- scripts/install-kilo-jsonc.mjs 2>/dev/null; then
            echo "❌ Lock file has digests but install-kilo-jsonc.mjs does not use pinnedImage()"
            echo "   → Ensure the installer reads MCP_IMAGE_PINS.lock.json"
            exit 1
          fi
          # Repo config should also reference digests once lock is populated (reproducible checkout)
          if ! git grep -q '@sha256:' -- kilo.jsonc 2>/dev/null; then
            echo "❌ Digest lock populated but kilo.jsonc does not reference @sha256 digests"
            echo "   → Run: node scripts/update-mcp-image-pins.mjs && node scripts/install-kilo-jsonc.mjs"
            exit 1
          fi
          echo "✅ Docker digest pinning is enforced"

      - name: Inverse enforce - Lock must be populated if kilo.jsonc is pinned
        run: |
          if git grep -q '@sha256:' -- kilo.jsonc 2>/dev/null; then
            if ! grep -q '@sha256:' docs/MCP_IMAGE_PINS.lock.json 2>/dev/null; then
              echo "❌ kilo.jsonc contains @sha256: but lock file is placeholder/null"
              echo "   → Run: node scripts/update-mcp-image-pins.mjs"
              exit 1
            fi
            echo "✅ Inverse check passed: kilo.jsonc is pinned and lock is populated"
          fi
