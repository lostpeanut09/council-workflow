name: Repo Hygiene Guardrail

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  hygiene:
    name: Check repo sterility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No *.bak-* files tracked
        run: |
          if git ls-files | grep -E '\.bak-'; then
            echo "❌ Found tracked *.bak-* files. Run: git rm --cached <file>"
            exit 1
          fi
          echo "✅ No tracked backups"

      - name: No .backups/ directory tracked
        run: |
          if git ls-files | grep -E '^\\.backups/'; then
            echo "❌ Found tracked .backups/ contents. Run: git rm -r --cached .backups/"
            exit 1
          fi
          echo "✅ .backups/ not tracked"

      - name: No absolute Windows paths (C:\) in tracked files
        run: |
          if git grep -l 'C:\\' -- ':!*.yml' ':!*.md' ':!*.json' 2>/dev/null; then
            echo "❌ Found hardcoded C:\\ paths in source files"
            exit 1
          fi
          echo "✅ No hardcoded Windows paths"

      - name: No runtime docs committed
        run: |
          if git ls-files | grep -E '^docs/(PLAN|REVIEW_KILO)\.md$'; then
            echo "❌ Runtime artifact docs/PLAN.md or docs/REVIEW_KILO.md is tracked"
            exit 1
          fi
          echo "✅ No runtime docs tracked"

      - name: .gitattributes has no BOM
        run: |
          first_bytes=$(xxd -p -l 3 .gitattributes)
          if [ "$first_bytes" = "efbbbf" ] || [ "$first_bytes" = "fffe2e" ] || [ "$first_bytes" = "feff00" ]; then
            echo "❌ .gitattributes has a BOM: $first_bytes"
            exit 1
          fi
          echo "✅ .gitattributes is BOM-free (first bytes: $first_bytes)"

      - name: No hardcoded secrets or backend configs tracked
        run: |
          # 1) Check for leaked API keys (NVIDIA/Requesty/Kilo)
          if git grep -E '(NVIDIA_NIM_API_KEY|REQUESTY_API_KEY|KILO_API_KEY)=' -- ':!*.example' 2>/dev/null; then
            echo "❌ Found hardcoded API keys in tracked files"
            exit 1
          fi
          # 2) Check for hardcoded COUNCIL_BACKEND
          if git grep -E '^COUNCIL_BACKEND=' -- ':!*.example' 2>/dev/null; then
            echo "❌ Found hardcoded COUNCIL_BACKEND in tracked files (use .env)"
            exit 1
          fi
          echo "✅ No hardcoded secrets or backend configs"

      - name: Setup Node.js (for lockfile check)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lockfile in sync with package.json (if present)
        run: |
          if [ ! -f "package-lock.json" ]; then
            echo "ℹ️  No package-lock.json found — skipping lockfile sync check"
            exit 0
          fi
          if [ ! -f "package.json" ]; then
            echo "❌ package-lock.json exists but package.json is missing"
            exit 1
          fi
          # Dry-run: regenerate lockfile without running lifecycle hooks or installing
          npm install --package-lock-only --ignore-scripts --no-audit --no-fund > /dev/null 2>&1
          if ! git diff --quiet package-lock.json; then
            echo "❌ package-lock.json is out of sync with package.json"
            echo "   Run: npm install && git add package-lock.json"
            git diff --stat package-lock.json
            exit 1
          fi
          echo "✅ package-lock.json is in sync with package.json"
